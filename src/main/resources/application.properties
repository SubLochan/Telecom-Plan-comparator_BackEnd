# ===== Application =====
spring.application.name=telecom-plan-comparator
server.port=8080

# ===== H2 In-Memory DB (default/dev profile) =====
#spring.datasource.url=jdbc:h2:mem:telecomdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.url=jdbc:h2:file:D:/telecomdb/telecomdb;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== JPA / Hibernate =====
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===== JWT =====
app.jwt.secret=3f8e9c2a1b7d6e4f0a5c8b2d9e3f1a4c7b0d5e8f2a9c6b3d0e7f4a1c8b5d2e9f
app.jwt.expiration-ms=86400000

# ===== CORS =====
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ===== Logging =====
logging.level.com.telecom=DEBUG
logging.level.org.springframework.security=INFO

# ===== SpringDoc / Swagger =====
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
